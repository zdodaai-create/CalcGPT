<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.1" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Base Calculator Path -->
    <g id="calcIcon">
      <rect x="-18" y="-24" width="36" height="48" rx="8" fill="url(#centerGrad)" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.9"/>
      <rect x="-10" y="-16" width="20" height="12" rx="3" fill="#FFFFFF" fill-opacity="0.95"/>
      <circle cx="-8" cy="4" r="3" fill="#FFFFFF"/>
      <circle cx="0" cy="4" r="3" fill="#FFFFFF"/>
      <circle cx="8" cy="4" r="3" fill="#FFFFFF"/>
      <circle cx="-8" cy="14" r="3" fill="#FFFFFF"/>
      <circle cx="0" cy="14" r="3" fill="#FFFFFF"/>
      <circle cx="8" cy="14" r="3" fill="#FFFFFF"/>
    </g>

    <!-- Mini Calculator Path (Glassmorphic) -->
    <g id="miniCalc">
      <rect x="-12" y="-16" width="24" height="32" rx="4" fill="rgba(255, 255, 255, 0.05)" stroke="url(#centerGrad)" stroke-width="1.5" />
      <rect x="-7" y="-10" width="14" height="7" rx="2" fill="url(#centerGrad)" fill-opacity="0.9"/>
      <circle cx="-5" cy="3" r="2" fill="#FFFFFF" fill-opacity="0.8"/>
      <circle cx="5" cy="3" r="2" fill="#FFFFFF" fill-opacity="0.8"/>
      <circle cx="-5" cy="9" r="2" fill="#FFFFFF" fill-opacity="0.8"/>
      <circle cx="5" cy="9" r="2" fill="#FFFFFF" fill-opacity="0.8"/>
    </g>
  </defs>

  <style>
    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.6)); }
      50% { transform: scale(1.08); filter: drop-shadow(0 0 45px rgba(6, 182, 212, 0.9)); }
    }
    @keyframes spinSlow {
      100% { transform: rotate(360deg); }
    }
    @keyframes spinReverse {
      100% { transform: rotate(-360deg); }
    }
    .center-badge {
      animation: pulseGlow 4s ease-in-out infinite;
      transform-origin: 256px 256px;
    }
    .orbit-ring-1 {
      animation: spinSlow 16s linear infinite;
      transform-origin: 256px 256px;
    }
    .orbit-ring-2 {
      animation: spinReverse 24s linear infinite;
      transform-origin: 256px 256px;
    }
    .orbit-item {
      animation: spinReverse 16s linear infinite;
    }
    .orbit-item-rev {
      animation: spinSlow 24s linear infinite;
    }
  </style>

  <!-- Background for the icon (optional, usually dark looks best for neon) -->
  <rect width="512" height="512" fill="#0A0F1C" rx="120" />

  <!-- Outer Orbit 2 -->
  <g class="orbit-ring-2">
    <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="10 15" />
    <g transform="translate(76, 256)"><g class="orbit-item-rev"><use href="#miniCalc" /></g></g>
    <g transform="translate(436, 256)"><g class="orbit-item-rev"><use href="#miniCalc" /></g></g>
    <g transform="translate(256, 76)"><g class="orbit-item-rev"><use href="#miniCalc" /></g></g>
    <g transform="translate(256, 436)"><g class="orbit-item-rev"><use href="#miniCalc" /></g></g>
  </g>

  <!-- Inner Orbit 1 -->
  <g class="orbit-ring-1">
    <circle cx="256" cy="256" r="110" fill="none" stroke="url(#ringGrad)" stroke-width="3" stroke-dasharray="20 20" />
    <!-- 3 calculators spaced at 120 degrees on r=110 -->
    <!-- 0 deg: (366, 256) -->
    <g transform="translate(366, 256)"><g class="orbit-item"><use href="#miniCalc" /></g></g>
    <!-- 120 deg: x = 256 - 55 = 201, y = 256 + 95.2 = 351.2 -->
    <g transform="translate(201, 351)"><g class="orbit-item"><use href="#miniCalc" /></g></g>
    <!-- 240 deg: x = 256 - 55 = 201, y = 256 - 95.2 = 160.8 -->
    <g transform="translate(201, 161)"><g class="orbit-item"><use href="#miniCalc" /></g></g>
  </g>

  <!-- Center Ambient Glow -->
  <circle cx="256" cy="256" r="70" fill="url(#centerGrad)" filter="url(#strongGlow)" opacity="0.35" />
  
  <!-- Center Main Calculator -->
  <g class="center-badge" transform="translate(256, 256) scale(2.2)">
    <use href="#calcIcon" />
  </g>

  <!-- Floating Particles -->
  <circle cx="150" cy="150" r="5" fill="#06B6D4" filter="url(#glow)" opacity="0.8">
    <animate attributeName="cy" values="150;120;150" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="380" cy="180" r="7" fill="#8B5CF6" filter="url(#glow)" opacity="0.6">
    <animate attributeName="cy" values="180;150;180" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="120" cy="380" r="6" fill="#3B82F6" filter="url(#glow)" opacity="0.7">
    <animate attributeName="cy" values="380;410;380" dur="6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="6s" repeatCount="indefinite" />
  </circle>
  <circle cx="350" cy="400" r="4" fill="#FFFFFF" filter="url(#glow)" opacity="0.9">
    <animate attributeName="cy" values="400;370;400" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
