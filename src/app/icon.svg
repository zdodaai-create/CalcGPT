<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    {/* Vibrant bright gradients matching the brand colors in the image */}
    <linearGradient id="icon-red-grad" x1="20" y1="20" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#FF4B5C" />
      <stop offset="100%" stopColor="#E01E37" />
    </linearGradient>
    <linearGradient id="icon-green-grad" x1="80" y1="20" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#22C55E" />
      <stop offset="100%" stopColor="#15803D" />
    </linearGradient>
    <linearGradient id="icon-blue-grad" x1="80" y1="80" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#3B82F6" />
      <stop offset="100%" stopColor="#1D4ED8" />
    </linearGradient>
    <linearGradient id="icon-yellow-grad" x1="20" y1="80" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#FFC72C" />
      <stop offset="100%" stopColor="#EA580C" />
    </linearGradient>
  </defs>

  {/* Outer interlinked C-hooks with exact 120-degree bend and perfect rounded overlap */}
  {/* Red Hook (Top-Left) */}
  <path
    d="M 46 24 L 36 24 C 28 24, 24 28, 24 36 L 24 42 C 24 48, 28 52, 34 56 L 42 60"
    stroke="url(#icon-red-grad)"
    strokeWidth="10"
    strokeLinecap="round"
    strokeLinejoin="round"
  />

  {/* Green Hook (Top-Right) */}
  <path
    d="M 76 46 L 76 36 C 76 28, 72 24, 64 24 L 58 24 C 52 24, 48 28, 44 34 L 40 42"
    stroke="url(#icon-green-grad)"
    strokeWidth="10"
    strokeLinecap="round"
    strokeLinejoin="round"
  />

  {/* Blue Hook (Bottom-Right) */}
  <path
    d="M 54 76 L 64 76 C 72 76, 76 72, 76 64 L 76 58 C 76 52, 72 48, 66 44 L 58 40"
    stroke="url(#icon-blue-grad)"
    strokeWidth="10"
    strokeLinecap="round"
    strokeLinejoin="round"
  />

  {/* Yellow Hook (Bottom-Left) */}
  <path
    d="M 24 54 L 24 64 C 24 72, 28 76, 36 76 L 42 76 C 48 76, 52 72, 56 66 L 60 58"
    stroke="url(#icon-yellow-grad)"
    strokeWidth="10"
    strokeLinecap="round"
    strokeLinejoin="round"
  />

  {/* Concentric inner dashes nestled perfectly inside each curve */}
  {/* Red Inner Dash */}
  <line
    x1="35"
    y1="35"
    x2="43"
    y2="43"
    stroke="url(#icon-red-grad)"
    strokeWidth="9"
    strokeLinecap="round"
  />

  {/* Green Inner Dash */}
  <line
    x1="65"
    y1="35"
    x2="57"
    y2="43"
    stroke="url(#icon-green-grad)"
    strokeWidth="9"
    strokeLinecap="round"
  />

  {/* Blue Inner Dash */}
  <line
    x1="65"
    y1="65"
    x2="57"
    y2="57"
    stroke="url(#icon-blue-grad)"
    strokeWidth="9"
    strokeLinecap="round"
  />

  {/* Yellow Inner Dash */}
  <line
    x1="35"
    y1="65"
    x2="43"
    y2="57"
    stroke="url(#icon-yellow-grad)"
    strokeWidth="9"
    strokeLinecap="round"
  />
</svg>
